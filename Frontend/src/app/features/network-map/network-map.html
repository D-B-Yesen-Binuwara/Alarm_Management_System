<div class="min-h-screen bg-gray-100 py-8 px-4">
  <div class="mx-auto pr-4 pl-4">
    <div class="bg-white rounded-lg border-2 border-gray-300 shadow-lg overflow-hidden">
      <!-- Header -->
      <div class="px-6 py-4 border-b border-gray-300 bg-gray-50">
        <h2 class="text-xl font-bold text-gray-800">Network Map - Sri Lanka</h2>
        <p class="text-sm text-gray-600 mt-1">Real-time network device visualization and monitoring</p>
      </div>

      <!-- Loading -->
      @if (loading()) {
        <div class="flex items-center justify-center py-32 text-gray-500">
          <svg class="animate-spin h-8 w-8 mr-3 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span class="text-lg font-medium">Loading map...</span>
        </div>
      }

      <!-- Error -->
      @if (error()) {
        <div class="m-6 bg-red-50 border-2 border-red-300 text-red-700 rounded-lg px-6 py-4">
          <div class="flex items-start">
            <span class="text-2xl mr-3">⚠️</span>
            <div>
              <h3 class="font-semibold">Failed to Load Map</h3>
              <p class="text-sm mt-1">{{ error() }}</p>
            </div>
          </div>
        </div>
      }

      <!-- Map Container -->
      @if (!loading()) {
        <div class="border-t border-gray-300">
          <div id="map" class="w-full" style="height: 600px;"></div>
        </div>
      }
    </div>
  </div>
</div>
